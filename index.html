<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>机械工程师的储物间</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
<style>
:root {
--bg:#f5f7fa;--card-bg:#fff;--text:#2d3748;--text-secondary:#718096;--border:#e2e8f0;
--primary:#3182ce;--primary-light:#ebf8ff;--hover:#edf2f7;--sidebar-bg:#fff;
--shadow:0 4px 6px -1px rgba(0,0,0,0.1),0 2px 4px -1px rgba(0,0,0,0.06);
--shadow-lg:0 10px 15px -3px rgba(0,0,0,0.1),0 4px 6px -2px rgba(0,0,0,0.05);
--danger:#e53e3e;--danger-light:#fed7d7;--success:#38a169;--success-light:#c6f6d5;
--warning:#dd6b20;--warning-light:#feebc8;
}
[data-theme="dark"] {
--bg:#1a202c;--card-bg:#2d3748;--text:#e2e8f0;--text-secondary:#a0aec0;--border:#4a5568;
--primary:#63b3ed;--primary-light:#2c5282;--hover:#4a5568;--sidebar-bg:#171923;
--shadow:0 4px 6px -1px rgba(0,0,0,0.3),0 2px 4px -1px rgba(0,0,0,0.2);
--shadow-lg:0 10px 15px -3px rgba(0,0,0,0.4),0 4px 6px -2px rgba(0,0,0,0.3);
--danger:#fc8181;--danger-light:#742a2a;--success:#68d391;--success-light:#22543d;
--warning:#f6ad55;--warning-light:#744210;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .3s,color .3s;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:300px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:background .3s}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:1.2rem;display:flex;align-items:center;gap:8px}
.sidebar-header p{font-size:.75rem;color:var(--text-secondary);margin-top:4px}
.search-box{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;background:var(--bg);color:var(--text);outline:none;margin-top:12px;transition:all .2s}
.search-box:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(49,130,206,.15)}
.search-box-mobile{display:none}
.category-list{flex:1;overflow-y:auto;padding:8px;position:relative}
.nav-indicator{position:absolute;left:8px;right:8px;border-radius:8px;background:var(--primary-light);z-index:0;pointer-events:none}
.category-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:8px;cursor:pointer;transition:all .2s;margin-bottom:4px;position:relative}
.category-item:hover{background:var(--hover)}
.category-item.active{background:transparent;color:var(--primary);font-weight:600}
.category-item .cat-icon{font-size:1.2rem;width:28px;text-align:center}
.category-item .cat-name{flex:1;font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.category-item .cat-count{font-size:.75rem;background:var(--bg);color:var(--text-secondary);padding:2px 8px;border-radius:10px;min-width:24px;text-align:center}
.category-item.active .cat-count{background:rgba(49,130,206,.15);color:var(--primary)}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.theme-toggle{background:none;border:1px solid var(--border);border-radius:6px;padding:6px 10px;cursor:pointer;color:var(--text);font-size:.85rem;transition:all .2s}
.theme-toggle:hover{background:var(--hover)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.main-header h2{font-size:1.4rem;display:flex;align-items:center;gap:10px}
.main-header .header-actions{display:flex;gap:10px}
.mobile-tabs{display:none}
.main-content{flex:1;overflow-y:auto;padding:24px 28px;transition:opacity .22s cubic-bezier(.4,0,.2,1),transform .38s cubic-bezier(.175,.885,.32,1.275)}
.main-content.switching{opacity:0;transform:translateX(14px)}
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.link-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:20px;text-decoration:none;color:inherit;transition:all .3s;display:flex;align-items:flex-start;gap:12px;box-shadow:var(--shadow);cursor:pointer;position:relative}
.link-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--primary)}
.link-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.link-info{flex:1;min-width:0}
.link-name{font-weight:600;font-size:1rem;margin-bottom:4px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-desc{font-size:.85rem;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.link-arrow{color:var(--text-secondary);opacity:0;transition:opacity .3s;font-size:1.2rem}
.link-card:hover .link-arrow{opacity:1}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.empty-state-icon{font-size:3rem;margin-bottom:16px}
.edit-btn,.delete-btn,.add-btn,.save-btn,.cancel-btn{border:none;border-radius:6px;padding:5px 8px;cursor:pointer;font-size:.75rem;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.edit-btn{background:var(--primary-light);color:var(--primary)}.edit-btn:hover{opacity:.8}
.delete-btn{background:var(--danger-light);color:var(--danger)}.delete-btn:hover{opacity:.8}
.add-btn{background:var(--success-light);color:var(--success);font-weight:600}
.add-btn:hover{opacity:.8}
.save-btn{background:var(--success-light);color:var(--success);font-weight:600;padding:8px 16px}
.cancel-btn{background:var(--hover);color:var(--text-secondary);padding:8px 16px}
.edit-actions{display:none;gap:6px}
.edit-mode .edit-actions{display:flex}
.edit-mode .category-item{padding-right:8px}
.link-card-actions{display:none;position:absolute;top:8px;right:8px;gap:4px}
.edit-mode .link-card-actions{display:flex}
.cat-actions{display:none;gap:4px}
.edit-mode .cat-actions{display:flex}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--card-bg);border-radius:16px;padding:28px;width:90%;max-width:420px;box-shadow:var(--shadow-lg);animation:modalIn .3s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal h3{margin-bottom:20px;font-size:1.2rem}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.85rem;color:var(--text-secondary);margin-bottom:6px}
.form-group input,.form-group select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.95rem;background:var(--bg);color:var(--text);outline:none;transition:all .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(49,130,206,.15)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.edit-banner{display:none;background:linear-gradient(90deg,var(--warning-light),var(--warning));color:#744210;padding:10px 20px;font-size:.9rem;font-weight:600;align-items:center;justify-content:space-between}
[data-theme="dark"] .edit-banner{color:var(--warning-light)}
.edit-mode .edit-banner{display:flex}
.export-btn{background:var(--card-bg);border:1px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;color:var(--text);font-size:.85rem;transition:all .2s}
.export-btn:hover{background:var(--hover)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-secondary)}

@media(max-width:767px){
body{height:auto;overflow:auto;-webkit-tap-highlight-color:transparent}
.app{flex-direction:column;height:auto;min-height:100vh}
.sidebar{display:none}
.main{overflow:visible}
.main-header{padding:12px 16px;flex-wrap:wrap;gap:8px;align-items:center}
.main-header h2{font-size:1.15rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main-header .header-actions{flex-shrink:0}
.search-box-mobile{display:block;width:100%;margin-top:0}
.mobile-tabs{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--sidebar-bg);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.mobile-tabs::-webkit-scrollbar{display:none}
.mobile-tab-item{flex-shrink:0;padding:7px 14px;border-radius:20px;background:var(--bg);border:1px solid var(--border);font-size:.82rem;cursor:pointer;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:4px}
.mobile-tab-item.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.mobile-tab-actions{display:none;font-size:.8rem;margin-left:2px;opacity:.85}
.edit-mode .mobile-tab-actions{display:inline}
.main-content{padding:16px;overflow:visible}
.links-grid{grid-template-columns:1fr;gap:12px}
.link-card{padding:16px}
.link-name{font-size:.95rem}
.empty-state{padding:40px 16px}
.empty-state-icon{font-size:2.5rem}
.edit-banner{flex-direction:column;gap:8px;text-align:center;font-size:.8rem;padding:8px 12px}
.modal{width:92%;padding:20px;max-width:none;margin:16px}
.modal h3{font-size:1.1rem}
}
</style>
</head>

</div>

<div class="form-group">

</div>

<div class="modal-actions">
<button class="cancel-btn" onclick="closeModal('loginModal')">取消</button>
<button class="save-btn" onclick="doLogin()">进入</button>
</div>
</div>
</div>
<div class="modal-overlay" id="catModal">
<div class="modal">

<div class="form-group">

<input type="text" id="catNameInput" placeholder="如：CAD / 三维建模">
</div>
<div class="form-group">
<label>图标</label>
<input type="text" id="catIconInput" placeholder="如：📐">
</div>
<div class="modal-actions">

<button class="save-btn" onclick="saveCategory()">保存</button>
</div>
</div>
</div>
<div class="modal-overlay" id="linkModal">

<input type="text" id="linkNameInput" placeholder="如：SolidWorks">
</div>
<div class="form-group">
<label>描述</label>

<div class="form-group">
<label>网址</label>
<input type="text" id="linkUrlInput" placeholder="https://...">
</div>
<div class="form-group">

<input type="text" id="linkIconInput" placeholder="如：🔷">
</div>
<div class="form-group">
<label>背景色</label>
<select id="linkColorInput">

<option value="#f5f5f5">浅灰</option>
<option value="#e8eaf6">浅靛</option>
</select>
</div>
<div class="modal-actions">
<button class="cancel-btn" onclick="closeModal('linkModal')">取消</button>
<button class="save-btn" onclick="saveLink()">保存</button>
</div>
</div>
</div>

// ===================== 弹簧物理导航指示器 =====================
class SpringIndicator{
constructor(el){
this.el=el;this.y=0;this.vy=0;this.targetY=0;this.targetH=0;this.h=0;
this.stiffness=280;this.damping=18;this.mass=1;this.running=false;
}
moveTo(y,h){
this.targetY=y;this.targetH=h;
if(!this.running){this.running=true;this.animate();}
}
animate(){
const steps=10,dt=1/60/steps;
for(let i=0;i<steps;i++){
const fy=-this.stiffness*(this.y-this.targetY);
const ay=fy/this.mass-this.damping*this.vy;
this.vy+=ay*dt;this.y+=this.vy*dt;
const fh=-this.stiffness*(this.h-this.targetH);
const ah=fh/this.mass-this.damping*this.vyH||0;
if(!this.vyH)this.vyH=0;
this.vyH+=ah*dt;this.h+=this.vyH*dt;
}
this.el.style.top=this.y+'px';
this.el.style.height=this.h+'px';
this.el.style.opacity=1;
if(Math.abs(this.vy)<0.2&&Math.abs(this.y-this.targetY)<0.3&&Math.abs(this.vyH)<0.2&&Math.abs(this.h-this.targetH)<0.3){
this.y=this.targetY;this.h=this.targetH;this.vy=0;this.vyH=0;
this.el.style.top=this.y+'px';this.el.style.height=this.h+'px';this.running=false;return;
}
requestAnimationFrame(()=>this.animate());
}
}
let springIndicator=null;
function updateIndicator(){
if(window.innerWidth<=767)return;
const list=document.getElementById('categoryList');
const active=list.querySelector('.category-item.active');
const ind=document.getElementById('navIndicator');
if(!active||!ind)return;
if(!springIndicator)springIndicator=new SpringIndicator(ind);
const pad=8;
springIndicator.moveTo(active.offsetTop-pad,active.offsetHeight);
}
// ===================== 弹簧结束 =====================

let categories=[],activeCategory=null,isEditMode=false,editingCatId=null,editingLinkIdx=null,searchQuery='';

function init(){loadData();renderSidebar();setupEvents();restoreTheme()}
function loadData(){const s=localStorage.getItem('nav_data');categories=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_CATEGORIES))}
function saveData(){localStorage.setItem('nav_data',JSON.stringify(categories))}
function getFilteredCategories(){
return categories.filter(cat=>{if(!searchQuery)return true;const q=searchQuery.toLowerCase();if(cat.name.toLowerCase().includes(q))return true;return cat.links.some(l=>(l.name+' '+l.desc).toLowerCase().includes(q))});
}

function renderSidebar(){
const list=document.getElementById('categoryList');
const ind=list.querySelector('.nav-indicator');
const filtered=getFilteredCategories();
list.innerHTML=filtered.map(cat=>`<div class="category-item ${activeCategory===cat.id?'active':''}" onclick="selectCategory('${cat.id}')" data-cat-id="${cat.id}"><span class="cat-icon">${cat.icon}</span><span class="cat-name">${cat.name}</span>${!isEditMode?`<span class="cat-count">${cat.links.length}</span>`:''}<div class="cat-actions"><button class="edit-btn" onclick="event.stopPropagation();editCategory('${cat.id}')">✏️</button><button class="delete-btn" onclick="event.stopPropagation();deleteCategory('${cat.id}')">🗑️</button></div></div>`).join('');
if(isEditMode){const add=document.createElement('div');add.className='category-item';add.style='border:2px dashed var(--border);justify-content:center;color:var(--text-secondary)';add.innerHTML='<span>➕ 添加分类</span>';add.onclick=()=>addCategory();list.appendChild(add)}
if(ind)list.insertBefore(ind,list.firstChild);
setTimeout(updateIndicator,0);
renderMobileTabs(filtered);
}

function renderMobileTabs(filteredCats){
const container=document.getElementById('mobileTabs');
if(!container)return;
container.innerHTML=filteredCats.map(cat=>`<div class="mobile-tab-item ${activeCategory===cat.id?'active':''}" onclick="selectCategory('${cat.id}')"><span>${cat.icon} ${cat.name}</span>${isEditMode?`<span class="mobile-tab-actions" onclick="event.stopPropagation();editCategory('${cat.id}')">✏️</span><span class="mobile-tab-actions" onclick="event.stopPropagation();deleteCategory('${cat.id}')">🗑️</span>`:''}</div>`).join('');
if(isEditMode){container.innerHTML+=`<div class="mobile-tab-item" style="border:2px dashed var(--border);background:transparent" onclick="addCategory()">➕ 添加</div>`;}
}

function renderMain(){
const content=document.getElementById('mainContent'),title=document.getElementById('mainTitle'),actions=document.getElementById('headerActions');
if(!activeCategory){title.innerHTML='📐 选择一个分类';content.innerHTML='<div class="empty-state"><div class="empty-state-icon">👈</div><h3>请选择一个分类</h3><p>点击上方标签或左侧菜单查看资源链接</p></div>';actions.innerHTML='';return}
const cat=categories.find(c=>c.id===activeCategory);if(!cat)return;
title.innerHTML=`${cat.icon} ${cat.name}`;
actions.innerHTML=isEditMode?'<button class="add-btn" onclick="addLink()">➕ 添加链接</button>':'';
const filtered=cat.links.filter(link=>{if(!searchQuery)return true;return(link.name+' '+link.desc).toLowerCase().includes(searchQuery.toLowerCase())});
if(filtered.length===0){content.innerHTML='<div class="empty-state"><div class="empty-state-icon">🔍</div><h3>没有找到匹配的链接</h3><p>尝试其他关键词，或添加新链接</p></div>';return}
content.innerHTML='<div class="links-grid">'+filtered.map((link,idx)=>{const realIdx=cat.links.indexOf(link);return`<a href="${link.url}" target="_blank" class="link-card"><div class="link-icon" style="background:${link.color}">${link.icon}</div><div class="link-info"><div class="link-name">${link.name}</div><div class="link-desc">${link.desc}</div></div><span class="link-arrow">→</span><div class="link-card-actions"><button class="edit-btn" onclick="event.preventDefault();event.stopPropagation();editLink(${realIdx})">✏️</button><button class="delete-btn" onclick="event.preventDefault();event.stopPropagation();deleteLink(${realIdx})">🗑️</button></div></a>`}).join('')+'</div>';
}

function selectCategory(id){
const content=document.getElementById('mainContent');
content.classList.add('switching');
setTimeout(()=>{
activeCategory=id;
renderSidebar();
renderMain();
content.classList.remove('switching');
setTimeout(updateIndicator,0);
if(window.innerWidth<=767&&id){
const contentTop=document.getElementById('mainContent').offsetTop-10;
window.scrollTo({top:contentTop,behavior:'smooth'});
}
},120);
}
function setupEvents(){
document.getElementById('gearIcon').addEventListener('dblclick',function(e){e.stopPropagation();if(isEditMode)return;openLogin()});
document.getElementById('searchBox').addEventListener('input',function(e){searchQuery=e.target.value.trim();renderSidebar();if(activeCategory)renderMain()});
document.getElementById('searchBoxMobile').addEventListener('input',function(e){searchQuery=e.target.value.trim();renderSidebar();if(activeCategory)renderMain()});
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('show')}));
}

function openLogin(){const has=localStorage.getItem('admin_pass');document.getElementById('loginTitle').textContent=has?'🔐 进入编辑模式':'🔐 首次使用，请设置密码';document.getElementById('loginError').style.display='none';document.getElementById('loginPass').value='';document.getElementById('loginModal').classList.add('show');setTimeout(()=>document.getElementById('loginPass').focus(),100)}
function doLogin(){const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value,saved=localStorage.getItem('admin_pass');if(!u||!p)return;if(!saved){localStorage.setItem('admin_user',btoa(u));localStorage.setItem('admin_pass',btoa(p));closeModal('loginModal');enterEditMode();return}if(btoa(u)===localStorage.getItem('admin_user')&&btoa(p)===saved){closeModal('loginModal');enterEditMode()}else{document.getElementById('loginError').style.display='block'}}
function enterEditMode(){isEditMode=true;document.body.classList.add('edit-mode');renderSidebar();renderMain()}
function exitEditMode(){isEditMode=false;document.body.classList.remove('edit-mode');renderSidebar();renderMain()}

function addCategory(){editingCatId=null;document.getElementById('catModalTitle').textContent='添加分类';document.getElementById('catNameInput').value='';document.getElementById('catIconInput').value='📁';document.getElementById('catModal').classList.add('show')}
function editCategory(id){editingCatId=id;const cat=categories.find(c=>c.id===id);if(!cat)return;document.getElementById('catModalTitle').textContent='编辑分类';document.getElementById('catNameInput').value=cat.name;document.getElementById('catIconInput').value=cat.icon;document.getElementById('catModal').classList.add('show')}
function saveCategory(){const name=document.getElementById('catNameInput').value.trim(),icon=document.getElementById('catIconInput').value.trim()||'📁';if(!name)return alert('请输入分类名称');if(editingCatId){const cat=categories.find(c=>c.id===editingCatId);if(cat){cat.name=name;cat.icon=icon}}else{categories.push({id:'cat_'+Date.now(),name,icon,links:[]})}saveData();closeModal('catModal');renderSidebar()}
function deleteCategory(id){if(!confirm('确定要删除这个分类吗？分类下的所有链接也会被删除。'))return;categories=categories.filter(c=>c.id!==id);if(activeCategory===id)activeCategory=null;saveData();renderSidebar();renderMain()}

function addLink(){if(!activeCategory)return;editingLinkIdx=null;document.getElementById('linkModalTitle').textContent='添加链接';document.getElementById('linkNameInput').value='';document.getElementById('linkDescInput').value='';document.getElementById('linkUrlInput').value='';document.getElementById('linkIconInput').value='🔗';document.getElementById('linkColorInput').value='#e3f2fd';document.getElementById('linkModal').classList.add('show')}
function editLink(idx){if(!activeCategory)return;const cat=categories.find(c=>c.id===activeCategory);if(!cat||!cat.links[idx])return;const link=cat.links[idx];editingLinkIdx=idx;document.getElementById('linkModalTitle').textContent='编辑链接';document.getElementById('linkNameInput').value=link.name;document.getElementById('linkDescInput').value=link.desc;document.getElementById('linkUrlInput').value=link.url;document.getElementById('linkIconInput').value=link.icon;document.getElementById('linkColorInput').value=link.color||'#e3f2fd';document.getElementById('linkModal').classList.add('show')}
function saveLink(){const name=document.getElementById('linkNameInput').value.trim(),desc=document.getElementById('linkDescInput').value.trim();let url=document.getElementById('linkUrlInput').value.trim();const icon=document.getElementById('linkIconInput').value.trim()||'🔗',color=document.getElementById('linkColorInput').value;if(!name||!url)return alert('名称和网址不能为空');if(!url.startsWith('http'))url='https://'+url;const cat=categories.find(c=>c.id===activeCategory);if(!cat)return;if(editingLinkIdx!==null&&cat.links[editingLinkIdx]){cat.links[editingLinkIdx]={name,desc,url,icon,color}}else{cat.links.push({name,desc,url,icon,color})}saveData();closeModal('linkModal');renderSidebar();renderMain()}
function deleteLink(idx){if(!confirm('确定要删除这个链接吗？'))return;const cat=categories.find(c=>c.id===activeCategory);if(cat){cat.links.splice(idx,1);saveData();renderSidebar();renderMain()}}

function closeModal(id){document.getElementById(id).classList.remove('show')}
function toggleTheme(){const html=document.documentElement,btn=document.getElementById('themeBtn');if(html.dataset.theme==='dark'){delete html.dataset.theme;btn.textContent='🌙';localStorage.setItem('theme','light')}else{html.dataset.theme='dark';btn.textContent='☀️';localStorage.setItem('theme','dark')}}
function restoreTheme(){if(localStorage.getItem('theme')==='dark'){document.documentElement.dataset.theme='dark';document.getElementById('themeBtn').textContent='☀️'}}

// ===================== 导出功能 =====================
async function exportHTML() {
    saveData();
    try {
        const response = await fetch(location.href);
        if (!response.ok) throw new Error('fetch failed');
        let html = await response.text();
        const dataStr = JSON.stringify(categories, null, 1).replace(/\n/g, '\n');
        const newDataBlock = 'const DEFAULT_CATEGORIES = ' + dataStr + ';';
        html = html.replace(
            /const DEFAULT_CATEGORIES =\s*\[[\s\S]*?\];\s*\/\/ =+\s*数据结束\s*=+/,
            newDataBlock + '\n// ===================== 数据结束 ====================='
        );
        const blob = new Blob([html], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'index.html';
        a.click();
        URL.revokeObjectURL(a.href);
    } catch (e) {
        alert('导出需要网页通过服务器访问。\n\n如果你是在本地双击打开的文件，请：\n1. 先把网站部署到 GitHub Pages\n2. 然后在网页上点击导出\n\n或者，你可以直接复制浏览器中修改后的数据给我，我帮你生成新文件。');
    }
}
